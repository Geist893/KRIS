<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Kris ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
    font-family: 'Arial', sans-serif;
    text-align:center;
    color:white;
}

#startScreen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

button{
    padding:20px 40px;
    font-size:30px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4e88;
    cursor:pointer;
    box-shadow:0 0 20px rgba(255,255,255,0.8);
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

#content{
    display:none;
    position:absolute;
    width:100%;
    top:30%;
}

h1{
    font-size:50px;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px white; }
    to{ text-shadow:0 0 30px white; }
}

#message{
    font-size:30px;
    margin-top:20px;
    min-height:50px;
}

.heart{
    position:absolute;
    color:red;
    font-size:20px;
    animation: float 6s linear infinite;
}

@keyframes float{
    0%{ transform:translateY(100vh); opacity:1; }
    100%{ transform:translateY(-10vh); opacity:0; }
}
</style>
</head>

<body>

<div id="startScreen">
    <button onclick="startSurprise()">Ábreme ❤️</button>
</div>

<div id="content">
    <h1>KRIS 💖</h1>
    <div id="message"></div>
</div>

<!-- CAMBIA EL LINK DE LA MUSICA AQUÍ -->
<audio id="music" loop>
    <source src="Enrique guzmán-Te seguiré(Letra) [SdcTtonXjf4].mp3" type="audio/mpeg">
</audio>

<script>

function abrirSorpresa() {
    document.body.style.background = "#fff";

    const mensajes = [
        "TE AMO KRIS❤️",
        "Eres lo mejor que me ha pasado 💕",
        "Cada día te amo más 💗",
        "Mi persona favorita 💓",
        "Eres quien hace sonreír mi corazón 💖"
    ];

    const contenedor = document.createElement("div");
    contenedor.style.textAlign = "center";
    contenedor.style.marginTop = "50px";
    contenedor.style.fontSize = "24px";
    contenedor.style.fontWeight = "bold";
    contenedor.style.color = "#ff1493";

    document.body.appendChild(contenedor);

    let i = 0;
    function mostrarMensaje() {
        if (i < mensajes.length) {
            const p = document.createElement("p");
            p.innerText = mensajes[i];
            p.style.animation = "fade 2s";
            contenedor.appendChild(p);
            i++;
            setTimeout(mostrarMensaje, 2000);
        }
    }

    mostrarMensaje();

    // reproducir música
    const audio = document.getElementById("miMusica");
    if(audio){
        audio.play();
    }
}
</script>

</body>
</html>
